    <style>

        body {

            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            text-align: center;

            margin-bottom: 30px;
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .main-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--bayern-red);
            background-image: url(olise.jpg); /* ОБЯЗАТЕЛЬНО: ФОТО ДОЛЖНО ЛЕЖАТЬ РЯДОМ С index.html */
            background-size: cover;
            background-position: center;
            transition: 0.5s;
            box-shadow: 0 0 20px var(--bayern-red);
            background-color: #333;
        }

        .avatar-container:hover .main-avatar {
            transform: rotate(5deg) scale(1.05);
        }

        .bayern-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 40px;
            height: 40px;
            background: var(--bayern-red);
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 5, 45, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(220, 5, 45, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 5, 45, 0); }
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            margin: 10px 0;
            font-size: 32px;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--bayern-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bio {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
            margin: 20px 0;
            border-left: 4px solid var(--bayern-red);
            text-align: left;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: block;
            padding: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            transition: 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .link-item:hover {
            background: var(--bayern-red);
            transform: translateX(10px);
            box-shadow: -10px 0 20px rgba(220, 5, 45, 0.4);
        }

        /* --- WORDLE --- */
        .wordle-section {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            margin-bottom: 50px;
        }

        .wordle-grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }

        .wordle-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
        }

        .tile {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tile.correct { background: #538d4e; border-color: #538d4e; }
        .tile.present { background: #b59f3b; border-color: #b59f3b; }
        .tile.absent { background: #3a3a3c; border-color: #3a3a3c; }

        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }

        .key {
            padding: 10px 5px;
            min-width: 32px;
            background: #818384;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            user-select: none;
        }

        .key.wide { min-width: 50px; }
        .key:active { transform: scale(0.9); }

        .footer {
            margin-bottom: 30px;
            font-size: 11px;
            opacity: 0.4;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="avatar-container">
        <div class="main-ava
tar"></div> 
        <div class="bayern-badge">FCB</div>
    </div>

    <h1>FROELLY</h1>
    
    <div class="bio">
        <strong>⚡️ ABOUT ME:</strong><br>
        Web app developer in progress. Die-hard fan of <strong>FC Bayern</strong> & <strong>Zenit</strong>. Creating cool stuff and coding 24/7.
    </div>

    <div class="links">
        <a href="https://t.me/+fKYj8vE7cPI4ZDAy" class="link-item" style="border-left: 4px solid #24A1DE;">Telegram Channel</a>
        <a href="https://tiktok.com/@froelly" class="link-item" style="border-left: 4px solid #ee1d52;">TikTok</a>
        <a href="https://github.com/froelly" class="link-item" style="border-left: 4px solid #fff;">GitHub</a>
    </div>
</div>

<div class="wordle-section">
    <h3 style="font-family: 'Oswald'; color: var(--bayern-red); margin-top: 0;">FOOTBALL WORDLE</h3>
    <p style="font-size: 12px; opacity: 0.7; margin-bottom: 15px;">Guess the Bayern Legend (6 letters)</p>
    
    <div class="wordle-grid" id="grid"></div>

    <div class="keyboard" id="keyboard"></div>
</div>

<div class="footer">
    DESIGNED BY FROELLY | 2024
</div>

<script>
    const targetWord = "MULLER"; // Загаданное слово
    const grid = document.getElementById('grid');
    const keyboard = document.getElementById('keyboard');
    let currentRow = 0;
    let currentTile = 0;
    let guesses = ["", "", "", "", "", ""];

    // Создаем сетку 6x6
    for (let i = 0; i < 6; i++) {
        let row = document.createElement('div');
        row.className = 'wordle-row';
        for (let j = 0; j < 6; j++) {
            let tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${i}-${j}`;
            row.appendChild(tile);
        }
        grid.appendChild(row);
    }

    // Создаем клавиатуру
    const keys = ["Q","W","E","R","T","Y","U","I","O","P","A","S","D","F","G","H","J","K","L","Enter","Z","X","C","V","B","N","M","Del"];

    keys.forEach(key => {
        const button = document.createElement('div');
        button.innerText = key;
        button.className = 'key' + (key.length > 1 ? ' wide' : '');
        button.onclick = () => handleInput(key);
        keyboard.appendChild(button);
    });

    function handleInput(key) {
        if (key === "Enter") {
            checkRow();
        } else if (key === "Del" || key === "BACKSPACE") {
            if (currentTile > 0) {
                currentTile--;
                guesses[currentRow] = guesses[currentRow].slice(0, -1);
                updateGrid();
            }
        } else if (currentTile < 6 && key.length === 1 && /^[A-Z]$/.test(key)) {
            guesses[currentRow] += key;
            currentTile++;
            updateGrid();
        }
    }

    function updateGrid() {
        const rowTiles = [];
        for (let i = 0; i < 6; i++) {
            const tile = document.getElementById(`tile-${currentRow}-${i}`);
            tile.innerText = guesses[currentRow][i] || "";
        }
    }

    function checkRow() {
        const guess = guesses[currentRow];
        if (guess.length !== 6) {
            alert("Слово должно быть из 6 букв!"); // Добавлено сообщение об ошибке
            return;
        }

        // Проверяем, есть ли слово в словаре (можно добавить более сложную проверку на реальные слова)
        // Для простоты, пока проверяем только на загаданное слово.
        // const dictionary = ["MULLER", "LEWAND", "KIMMICH", "NEUER"]; // Пример словаря
        // if (!dictionary.includes(guess)) {
        //     alert("Такого слова нет в нашем словаре.");
        //     return;
        // }


        for (let i = 0; i < 6; i++) {
            const tile = document.getElementById(`tile-${currentRow}-${i}`);
            const letter = guess[i];
            
            if (letter === targetWord[i]) {
                tile.classList.add('correct');
            } else if (targetWord.includes(letter)) {
                tile.classList.add('present');
            } else {
                tile.classList.add('absent');
            }
        }

        if (guess === targetWord) {
            alert("Legendary! You guessed MULLER! ⚽️");
            return;
        }

        if (currentRow === 5) {
            alert("Game Over! The word was MULLER");
        } else {
            currentRow++;
            currentTile = 0;
        }
    }

 
    document.addEventListener('keydown', (e) => {
        let key = e.key.toUpperCase();
        if (key === "BACKSPACE") key = "Del";
        handleInput(key);
    });
</script>
