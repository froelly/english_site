<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Froelly | FC Bayern</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #dc052d;
            --navy: #001f3f;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Roboto', sans-serif;
            background: radial-gradient(circle at top, #1a1a1a 0%, #000814 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- НОВАЯ ШАПКА --- */
        .profile-card {
            width: 100%;
            max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--red);
            object-fit: cover;
            box-shadow: 0 0 15px rgba(220, 5, 45, 0.5);
            background-color: #222; /* Цвет пока грузится фото */
            display: block;
        }

        .badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--red);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            font-family: 'Oswald';
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
        }

        .bio {
            font-size: 14px;
            opacity: 0.9;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-family: 'Oswald';
            text-transform: uppercase;
            font-size: 16px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-tg { background: #24A1DE; }
        .btn-tt { background: #000; }
        .btn-gh { background: #333; }
        .btn:active { transform: scale(0.97); }

        /* --- WORDLE ОПТИМИЗАЦИЯ --- */
        .wordle-card {
            width: 100%;
            max-width: 380px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 30px;
        }

        .wordle-grid {
            display: grid;
            gap: 5px;
            margin-bottom: 15px;
            width: 100%;
        }

        .wordle-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
        }

        .tile {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
        }

        .tile.correct { background: #538d4e; border-color: #538d4e; }
        .tile.present { background: #b59f3b; border-color: #b59f3b; }
        .tile.absent { background: #3a3a3c; border-color: #3a3a3c; }

        .keyboard {
            display: grid;
            gap: 6px;
        }

        .kb-row {
            display: flex;
            justify-content: center;
            gap: 4px;
        }

        .key {
            background: #818384;
            color: white;
            border: 0;
            padding: 0;
            height: 45px;
            flex: 1;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        .key.wide { flex: 1.5; font-size: 11px; }

        @media (max-width: 360px) {
            .tile { font-size: 1.2rem; }
            .key { height: 40px; font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="avatar-wrapper">
        <!-- ФОТО ТУТ: Убедись, что файл на GitHub называется ТОЧНО olise.jpg -->
        <img src="olise.jpg" alt="Froelly" class="avatar-img" onerror="this.src='https://via.placeholder.com/110/222/fff?text=FCB'">
        <div class="badge">FCB</div>
    </div>

    <h1>FROELLY</h1>
    
    <div class="bio">
        Web App Developer. <br>
        Fan of <b>FC Bayern</b> & <b>Zenit</b>.
    </div>

    <div class="links">
        <a href="https://t.me/+fKYj8vE7cPI4ZDAy" class="btn btn-tg">Telegram</a>
        <a href="https://tiktok.com/@froelly" class="btn btn-tt">TikTok</a>
        <a href="https://github.com/froelly" class="btn btn-gh">GitHub</a>
    </div>
</div>

<div class="wordle-card">
    <h3 style="font-family: 'Oswald'; margin-top: 0; color: var(-
-red); text-align: center;">FOOTBALL WORDLE</h3>
    <div class="wordle-grid" id="grid"></div>

    <div class="keyboard">
        <div class="kb-row">
            <button class="key" onclick="handleInput('Q')">Q</button>
            <button class="key" onclick="handleInput('W')">W</button>
            <button class="key" onclick="handleInput('E')">E</button>
            <button class="key" onclick="handleInput('R')">R</button>
            <button class="key" onclick="handleInput('T')">T</button>
            <button class="key" onclick="handleInput('Y')">Y</button>
            <button class="key" onclick="handleInput('U')">U</button>
            <button class="key" onclick="handleInput('I')">I</button>
            <button class="key" onclick="handleInput('O')">O</button>
            <button class="key" onclick="handleInput('P')">P</button>
        </div>
        <div class="kb-row">
            <button class="key" onclick="handleInput('A')">A</button>
            <button class="key" onclick="handleInput('S')">S</button>
            <button class="key" onclick="handleInput('D')">D</button>
            <button class="key" onclick="handleInput('F')">F</button>
            <button class="key" onclick="handleInput('G')">G</button>
            <button class="key" onclick="handleInput('H')">H</button>
            <button class="key" onclick="handleInput('J')">J</button>
            <button class="key" onclick="handleInput('K')">K</button>
            <button class="key" onclick="handleInput('L')">L</button>
        </div>
        <div class="kb-row">
            <button class="key wide" onclick="handleInput('ENTER')">ENTER</button>
            <button class="key" onclick="handleInput('Z')">Z</button>
            <button class="key" onclick="handleInput('X')">X</button>
            <button class="key" onclick="handleInput('C')">C</button>
            <button class="key" onclick="handleInput('V')">V</button>
            <button class="key" onclick="handleInput('B')">B</button>
            <button class="key" onclick="handleInput('N')">N</button>
            <button class="key" onclick="handleInput('M')">M</button>
            <button class="key wide" onclick="handleInput('DEL')">DEL</button>
        </div>
    </div>
</div>

<script>
    const target = "MULLER";
    let curRow = 0, curCol = 0;
    let guesses = ["", "", "", "", "", ""];

    const grid = document.getElementById('grid');
    for (let i = 0; i < 6; i++) {
        const row = document.createElement('div');
        row.className = 'wordle-row';
        for (let j = 0; j < 6; j++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `t-${i}-${j}`;
            row.appendChild(tile);
        }
        grid.appendChild(row);
    }

    function handleInput(key) {
        if (key === 'ENTER') {
            if (guesses[curRow].length === 6) checkRow();
        } else if (key === 'DEL') {
            if (curCol > 0) {
                curCol--;
                guesses[curRow] = guesses[curRow].slice(0, -1);
                updateGrid();
            }
        } else {
            if (curCol < 6 && guesses[curRow].length < 6) {
                guesses[curRow] += key;
                curCol++;
                updateGrid();
            }
        }
    }

    function updateGrid() {
        const tile = document.getElementById(`t-${curRow}-${curCol - (guesses[curRow].length === curCol ? 0 : 0)}`);
        for(let i=0; i<6; i++) {
            document.getElementById(`t-${curRow}-${i}`).innerText = guesses[curRow][i] || "";
        }
    }

    function checkRow() {
        const guess= guesses[curRow];
        for (let i = 0; i < 6; i++) {
            const tile = document.getElementById(`t-${curRow}-${i}`);
            const char = guess[i];
            if (char === target[i]) tile.classList.add('correct');
            else if (target.includes(char)) tile.classList.add('present');
            else tile.classList.add('absent');
        }
        if (guess === target) alert("Legendary! MULLER!");
        else if (curRow === 5) alert("Game Over! Word: MULLER");
        else { curRow++; curCol = 0; }
    }

    document.addEventListener('keydown', (e) => {
        const k = e.key.toUpperCase();
        if (k === 'ENTER') handleInput('ENTER');
        else if (k === 'BACKSPACE') handleInput('DEL');
        else if (/^[A-Z]$/.test(k)) handleInput(k);
    });
</script>

</body>
</html>
