<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Froelly | FC Bayern Fan Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            /* Фирменные цвета: темно-синий и глубокий красный */
            background: radial-gradient(circle at top, #1c1c1c 0%, #001f3f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* Заглушка под фото (пока не вставишь свое) */
        .main-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #dc052d;
            background-color: #333;
            background-image: url(olise.jpg); /* ПУТЬ К ТВОЕМУ ФОТО */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            overflow: hidden; /* Чтобы картинка не вылезала за края */
        }

        .bayern-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 35px;
            height: 35px;
            background: #dc052d;
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            margin: 10px 0;
            font-size: 26px;
            letter-spacing: 1px;
            color: #dc052d;
        }

        .bio {
            background: rgba(220, 5, 45, 0.1);
            border-left: 3px solid #dc052d;
            padding: 15px;
            text-align: left;
            font-size: 14px;
            line-height: 1.5;
            margin: 20px 0;
            border-radius: 4px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: block;
            padding: 14px;
            background: #dc052d;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .link-item:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(220, 5, 45, 0.3);
        }

        .tg-link { background: #24A1DE; }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            opacity: 0.4;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar-container">
        <div class="main-avatar"></div> 
        <div class="bayern-badge">FCB</div>
    </div>

    <h1>FROELLY</h1>
    
    <div class="bio">
        <strong>about:</strong><br>
        I'm a budding web app developer and a fan of Bayern Munich and Zenit St. Petersburg. I'm always open to suggestions =)
    </div>

    <div class="links">
        <a href="https://t.me/+fKYj8vE7cPI4ZDAy" class="link-item tg-link">Telegram Channel</a>
        <a href="https://tiktok.com/@froelly" class="link-item">TikTok</a>
        <a href="https://github.com/froelly" class="link-item" style="background: #444;">GitHub</a>
    </div>

    <div class="footer">
        DESIGNED BY FROELLY
    </div>
</div>

</body>
</html>
